version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change...s:17
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgresql+asyncpg://app:${DB_PASSWORD:-change...n
      REDIS_URL: redis://redis:6379/0
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-base64encoded32byteskey==}
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
    volumes:
      - ./screenshots:/app/screenshots
      - ./videos:/app/videos

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "3501:3000"
    environment:
      VITE_API_URL: http://207.180.243.246:3500
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "3500:3500"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - ui

volumes:
  postgres_data:
