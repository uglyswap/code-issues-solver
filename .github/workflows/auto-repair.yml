name: Auto-repair

on:
  deployment_status

jobs:
  notify:
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Code Issues Solver
        env:
          # Le backend (webhooks.py) verifie X-Hub-Signature-256 = sha256=HMAC(body, secret).
          GITHUB_WEBHOOK_SECRET: ${{ secrets.GITHUB_WEBHOOK_SECRET }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: |
          # Body compact et fige: la signature HMAC doit porter sur les octets exacts envoyes.
          BODY="{\"event\":\"deployment_status\",\"deployment_status\":{\"state\":\"success\"},\"repository\":{\"full_name\":\"${REPO_FULL_NAME}\"}}"
          SIGNATURE="sha256=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$GITHUB_WEBHOOK_SECRET" | awk '{print $2}')"
          curl -X POST "http://${DEPLOY_HOST}:3500/api/webhooks/github" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: deployment_status" \
            -H "X-Hub-Signature-256: ${SIGNATURE}" \
            --data-binary "$BODY"
