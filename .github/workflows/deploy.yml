name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    needs: [lint, test, e2e, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to VPS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh -o StrictHostKeyChecking=no user@207.180.243.246 << 'EOF'
            cd /opt/data/code-issues-solver
            git pull origin main
            docker-compose down
            docker-compose up -d --build
          EOF
