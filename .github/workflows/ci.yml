name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Pas de cache npm: aucun ui/package-lock.json n'est versionne
          # (cache-dependency-path invalide ferait echouer le setup).

      - name: Install Python dependencies
        run: pip install ruff black mypy

      - name: Ruff lint
        run: ruff check backend/ workers/ browser/ agents/ integrations/

      - name: Black format check
        run: black --check backend/ workers/ browser/ agents/ integrations/

      - name: UI lint and type-check
        # npm install (pas npm ci): aucun lockfile versionne.
        run: cd ui && npm install && npm run lint && npm run type-check

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        # requirements-dev.txt inclut requirements.txt + pytest et outils de test.
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ --cov=backend --cov=workers --cov=browser --cov=agents --cov=integrations --cov-report=xml --cov-fail-under=80

      - uses: codecov/codecov-action@v3

  e2e:
    runs-on: ubuntu-latest
    # Variables requises par docker-compose (valeurs de test, jamais utilisees en prod).
    env:
      DB_PASSWORD: test_password
      ENCRYPTION_KEY: dGVzdGVuY3J5cHRpb25rZXkzMmJ5dGVzbG9uZ3Rlc3Q=
      JWT_SECRET: test_jwt_secret_ci_only
      GITHUB_WEBHOOK_SECRET: test_webhook_secret_ci_only
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Pas de cache npm: aucun tests/e2e/package-lock.json n'est versionne.

      - name: Build and start services
        run: docker-compose up -d --build

      - name: Install Playwright browsers
        run: cd tests/e2e && npx playwright install chromium

      - name: Run E2E tests
        run: cd tests/e2e && npx playwright test

      - name: Tear down services
        if: always()
        run: docker-compose down

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install security tools
        run: pip install bandit safety detect-secrets pip-audit

      - name: Bandit security lint
        run: bandit -r backend/ workers/ browser/ agents/ integrations/ -ll --severity-level medium

      - name: Safety scan (known vulnerabilities)
        # safety check --full-report est deprecie; safety scan le remplace.
        # || true: ne pas casser la CI sur un avis/depreciation non bloquant.
        run: safety scan || true

      - name: Pip audit
        run: pip-audit

      - name: Detect secrets scan
        # Non bloquant: generation de baseline informative, ne fait pas echouer la CI.
        run: detect-secrets scan backend/ workers/ > .secrets.baseline || true

      - name: Upload secrets baseline
        uses: actions/upload-artifact@v4
        with:
          name: secrets-baseline
          path: .secrets.baseline
