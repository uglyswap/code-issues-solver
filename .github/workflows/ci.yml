from pydantic_settings import BaseSettings
from pydantic import Field
from typing import List
import os


class Settings(BaseSettings):
    database_url: str = Field(default="postgresql+asyncpg://app:change...n")
    redis_url: str = Field(default="redis://localhost:***@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff black mypy
      - run: ruff check backend/ workers/ browser/ agents/ integrations/
      - run: black --check backend/ workers/ browser/ agents/ integrations/
      - run: cd ui && npm ci && npm run lint && npm run type-check

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pytest tests/ --cov=backend --cov=workers --cov=browser --cov=agents --cov=integrations --cov-report=xml --cov-fail-under=80
      - uses: codecov/codecov-action@v3

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker-compose up -d --build
      - run: cd tests/e2e && npx playwright install chromium && npx playwright test
      - run: docker-compose down

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install bandit safety detect-secrets
      - run: bandit -r backend/ -ll
      - run: safety check
      - run: detect-secrets scan backend/ > .secrets.baseline
